workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: SilentMorse
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.silentmorse.messenger
      flutter: stable
      xcode: latest
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload for TestFlight (internal/external testers). Builds appear after
        # Apple finishes processing (often 5–30+ minutes).
        submit_to_testflight: true
        # Set true only when you intend to send this build to App Review.
        submit_to_app_store: false

  android-play-store:
    name: Android Play Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_signing
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Set up Android signing
        script: |
          set +H
          KEYSTORE_PATH="$CM_BUILD_DIR/android/upload-keystore.jks"
          if [ -z "$CM_KEYSTORE" ]; then
            echo "ERROR: CM_KEYSTORE not set" && exit 1
          fi
          if [ -z "$CM_KEYSTORE_PASSWORD" ]; then
            echo "ERROR: CM_KEYSTORE_PASSWORD not set" && exit 1
          fi
          echo "$CM_KEYSTORE" | base64 --decode > "$KEYSTORE_PATH"
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=upload\nstoreFile=%s\n' \
            "$CM_KEYSTORE_PASSWORD" \
            "$CM_KEY_PASSWORD" \
            "$KEYSTORE_PATH" \
            > "$CM_BUILD_DIR/android/key.properties"
      - name: Build AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - android/upload-keystore.jks
